<!DOCTYPE html>
<html>

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Painel Admin</title>

<link rel="stylesheet" href="style.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body>

<div id="panel" class="container" style="display:none;">

<div class="card">

<h2>Painel Produtos</h2>

<input id="name" class="input" placeholder="Nome">
<input id="price" class="input" placeholder="Preço">
<input id="whatsapp" class="input" placeholder="WhatsApp">
<textarea id="desc" class="input" placeholder="Descrição"></textarea>

<input type="file" id="files" multiple accept="image/*" class="input">

<div id="preview" class="preview"></div>

<button id="btnSave" class="btn btn-main">Salvar</button>
<button id="logout" class="btn btn-danger">Sair</button>

</div>

<h3>Produtos</h3>
<div id="list" class="products"></div>

</div>

<script>

const supabase =
window.supabase.createClient(
"https://hjjonggbcrtajvtkrqms.supabase.co",
"sb_publishable_u7Z5lgt3hjIWOJxsihqh0Q_2A8MaTjE",
{
auth:{
persistSession:true,
autoRefreshToken:true,
detectSessionInUrl:false
}
}
)

let editingId = null

// 🔐 LOGIN CHECK PROFISSIONAL
async function protect(){

const { data } =
await supabase.auth.getSession()

if(!data.session){

window.location.href =
"login.html"

return

}

document.getElementById("panel").style.display="block"

load()

}

// 🚪 LOGOUT
document.addEventListener("DOMContentLoaded",()=>{

document.getElementById("logout").onclick = async ()=>{

await supabase.auth.signOut()

window.location.href="login.html"

}

// SAVE
document.getElementById("btnSave").onclick = save

// PREVIEW
document.getElementById("files").onchange = preview

})

// 🖼 PREVIEW IMAGES
function preview(){

const files =
document.getElementById("files").files

const box =
document.getElementById("preview")

box.innerHTML=""

for(let f of files){

const r = new FileReader()

r.onload = e => {

box.innerHTML += `
<img src="${e.target.result}">
`

}

r.readAsDataURL(f)

}

}

// 📤 UPLOAD REAL
async function upload(files){

let urls=[]

for(let f of files){

const name =
Date.now()+"_"+f.name

const { error } =
await supabase.storage
.from("products")
.upload(name,f)

if(error){

console.log(error)
continue

}

const { data } =
supabase.storage
.from("products")
.getPublicUrl(name)

urls.push(data.publicUrl)

}

return urls

}

// 💾 SAVE PRODUCT
async function save(){

const files =
document.getElementById("files").files

let imgs=[]

if(files.length){

imgs = await upload(files)

}

const product = {

name:name.value,
price:parseFloat(price.value),
whatsapp:whatsapp.value,
description:desc.value,
images:imgs

}

console.log("SAVING:",product)

let res

if(editingId){

res =
await supabase
.from("products")
.update(product)
.eq("id",editingId)

}else{

res =
await supabase
.from("products")
.insert([product])

}

console.log(res)

if(res.error){

alert(res.error.message)

return

}

clear()
load()

}

// 📦 LOAD PRODUCTS
async function load(){

const { data, error } =
await supabase
.from("products")
.select("*")
.order("id",{ascending:false})

if(error){

console.log(error)
return

}

list.innerHTML=""

data.forEach(p=>{

list.innerHTML += `
<div class="card">

<img src="${p.images?.[0] || ''}" width="100%">

<h3>${p.name}</h3>

<strong>R$ ${p.price}</strong>

<button onclick="edit(${p.id})">Editar</button>
<button onclick="del(${p.id})">Excluir</button>

</div>
`

})

}

// ✏️ EDIT
async function edit(id){

const { data } =
await supabase
.from("products")
.select("*")
.eq("id",id)
.single()

editingId = id

name.value = data.name
price.value = data.price
desc.value = data.description
whatsapp.value = data.whatsapp

}

// 🗑 DELETE
async function del(id){

await supabase
.from("products")
.delete()
.eq("id",id)

load()

}

// CLEAR
function clear(){

name.value=""
price.value=""
desc.value=""
whatsapp.value=""
files.value=""
preview.innerHTML=""

editingId=null

}

// START
protect()

</script>

</body>
</html>
