<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="style.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<title>Painel</title>
</head>

<body>

<div class="container">

<div class="card">

<h2>Painel Produtos</h2>

<input id="name" class="input" placeholder="Nome">

<input id="price" class="input" placeholder="Preço">

<input id="whatsapp" class="input" placeholder="WhatsApp">

<textarea id="desc" class="input" placeholder="Descrição"></textarea>

<input type="file" id="files" multiple class="input">

<div id="preview" class="preview"></div>

<button id="btnSave" class="btn btn-main">
Salvar Produto
</button>

</div>

<h3>Produtos</h3>

<div id="list" class="products"></div>

</div>

<script>
const supabase = window.supabase.createClient(
"https://hjjonggbcrtajvtkrqms.supabase.co",
"sb_publishable_u7Z5lgt3hjIWOJxsihqh0Q_2A8MaTjE"
)

let editingId = null

async function checkAuth(){

const { data } = await supabase.auth.getSession()

if(!data.session){
window.location.href = "login.html"
return
}

load()

}

document
.getElementById("files")
.addEventListener("change", previewImages)

function previewImages(){

const preview = document.getElementById("preview")

preview.innerHTML = ""

const files = document.getElementById("files").files

for(let file of files){

const reader = new FileReader()

reader.onload = e => {

preview.innerHTML += `
<img src="${e.target.result}">
`

}

reader.readAsDataURL(file)

}

}

async function upload(files){

let urls=[]

for(let f of files){

const fileName = Date.now()+"_"+f.name

await supabase
.storage
.from("products")
.upload(fileName,f)

const { data } = supabase
.storage
.from("products")
.getPublicUrl(fileName)

urls.push(data.publicUrl)

}

return urls

}

document
.getElementById("btnSave")
.addEventListener("click", save)

async function save(){

const files = document.getElementById("files").files

let imgs=[]

if(files.length > 0){
imgs = await upload(files)
}

const product = {
name:name.value,
price:parseFloat(price.value),
whatsapp:whatsapp.value,
description:desc.value,
images:imgs
}

if(editingId){

await supabase
.from("products")
.update(product)
.eq("id",editingId)

editingId = null

btnSave.innerText = "Salvar Produto"

}else{

await supabase
.from("products")
.insert([product])

}

clearForm()

load()

}

async function load(){

const { data } = await supabase
.from("products")
.select("*")
.order("id",{ascending:false})

list.innerHTML = ""

data.forEach(p=>{

list.innerHTML += `
<div class="card">

<img src="${p.images?.[0] || ''}" class="product-img">

<h3>${p.name}</h3>

<strong>R$ ${p.price}</strong>

<button class="btn btn-main"
onclick="edit(${p.id})">
Editar
</button>

<button class="btn btn-danger"
onclick="del(${p.id})">
Excluir
</button>

</div>
`

})

}

async function edit(id){

const { data } = await supabase
.from("products")
.select("*")
.eq("id",id)
.single()

editingId = id

name.value = data.name
price.value = data.price
desc.value = data.description
whatsapp.value = data.whatsapp

btnSave.innerText = "Atualizar Produto"

window.scrollTo({
top:0,
behavior:"smooth"
})

}

async function del(id){

await supabase
.from("products")
.delete()
.eq("id",id)

load()

}

function clearForm(){

name.value=""
price.value=""
desc.value=""
whatsapp.value=""
files.value=""
preview.innerHTML=""

}

checkAuth()
</script>

</body>
</html>
