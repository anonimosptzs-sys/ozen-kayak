<!DOCTYPE html>
<html>

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Painel Admin</title>

<link rel="stylesheet" href="style.css">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body>

<div
id="panel"
class="container"
>

<div class="card">

<h2>Painel Produtos</h2>

<input
id="name"
class="input"
placeholder="Nome"
>

<input
id="price"
class="input"
placeholder="Preço"
>

<input
id="whatsapp"
class="input"
placeholder="WhatsApp"
>

<textarea
id="desc"
class="input"
placeholder="Descrição"
></textarea>

<input
type="file"
id="files"
multiple
class="input"
>

<div
id="preview"
class="preview"
></div>

<button
id="btnSave"
class="btn btn-main"
type="button"
>
Salvar Produto
</button>

<button
id="logout"
class="btn btn-danger"
type="button"
>
Sair
</button>

</div>

<h3>Produtos</h3>

<div
id="list"
class="products"
></div>

</div>

<script>

const supabase =
window.supabase.createClient(
"https://hjjonggbcrtajvtkrqms.supabase.co",
"sb_publishable_u7Z5lgt3hjIWOJxsihqh0Q_2A8MaTjE",
{
auth:{
persistSession:true,
autoRefreshToken:true,
detectSessionInUrl:false
}
}
)

let editingId = null

async function protect(){

try{

const {
data,
error
} = await supabase.auth.getSession()

if(error || !data.session){

window.location.href =
"login.html"

return

}

load()

}catch(e){

console.log(e)

window.location.href =
"login.html"

}

}

window.addEventListener(
"DOMContentLoaded",
()=>{

document
.getElementById("btnSave")
.addEventListener(
"click",
save
)

document
.getElementById("logout")
.addEventListener(
"click",
async ()=>{

await supabase.auth.signOut()

window.location.href =
"login.html"

}
)

document
.getElementById("files")
.addEventListener(
"change",
previewImages
)

}
)

function previewImages(){

const preview =
document.getElementById("preview")

preview.innerHTML = ""

const files =
document.getElementById("files").files

if(files.length === 0){

preview.innerHTML =
"<p>Nenhuma imagem selecionada</p>"

return

}

for(let file of files){

const reader =
new FileReader()

reader.onload = e => {

preview.innerHTML += `

<div
style="
position:relative;
width:120px;
height:120px;
overflow:hidden;
border-radius:12px;
"
>

<img
src="${e.target.result}"
style="
width:100%;
height:100%;
object-fit:cover;
border-radius:12px;
border:2px solid rgba(255,255,255,.1);
"
>

</div>

`

}

reader.readAsDataURL(file)

}

}

async function upload(files){

let urls=[]

for(let f of files){

const fileName =
Date.now()+"_"+f.name

await supabase
.storage
.from("products")
.upload(fileName,f)

const { data } =
supabase
.storage
.from("products")
.getPublicUrl(fileName)

urls.push(data.publicUrl)

}

return urls

}

async function save(){

const files =
document.getElementById("files").files

let imgs=[]

if(files.length > 0){

imgs =
await upload(files)

}

const product = {
name:name.value,
price:parseFloat(price.value),
whatsapp:whatsapp.value,
description:desc.value,
images:imgs
}

if(editingId){

await supabase
.from("products")
.update(product)
.eq("id",editingId)

editingId = null

document
.getElementById("btnSave")
.innerText =
"Salvar Produto"

}else{

await supabase
.from("products")
.insert([product])

}

clearForm()

load()

}

async function load(){

const { data } =
await supabase
.from("products")
.select("*")
.order("id",{ascending:false})

list.innerHTML = ""

data.forEach(p=>{

list.innerHTML += `
<div class="card">

<img
src="${p.images?.[0] || ''}"
style="
width:100%;
height:220px;
object-fit:cover;
border-radius:12px;
margin-bottom:10px;
"
>

<h3>${p.name}</h3>

<strong>
R$ ${p.price}
</strong>

<div
style="
display:flex;
gap:10px;
margin-top:15px;
"
>

<button
class="btn btn-main"
onclick="edit(${p.id})"
>
Editar
</button>

<button
class="btn btn-danger"
onclick="del(${p.id})"
>
Excluir
</button>

</div>

</div>
`

})

}

async function edit(id){

const { data } =
await supabase
.from("products")
.select("*")
.eq("id",id)
.single()

editingId = id

name.value = data.name
price.value = data.price
desc.value = data.description
whatsapp.value = data.whatsapp

document
.getElementById("preview")
.innerHTML = ""

if(data.images){

data.images.forEach(img=>{

document
.getElementById("preview")
.innerHTML += `

<div
style="
position:relative;
width:120px;
height:120px;
overflow:hidden;
border-radius:12px;
"
>

<img
src="${img}"
style="
width:100%;
height:100%;
object-fit:cover;
border-radius:12px;
border:2px solid rgba(255,255,255,.1);
"
>

</div>

`

})

}

document
.getElementById("btnSave")
.innerText =
"Atualizar Produto"

window.scrollTo({
top:0,
behavior:"smooth"
})

}

async function del(id){

await supabase
.from("products")
.delete()
.eq("id",id)

load()

}

function clearForm(){

name.value=""
price.value=""
desc.value=""
whatsapp.value=""
files.value=""

document
.getElementById("preview")
.innerHTML=""

}

protect()

</script>

</body>
</html>
