<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="style.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body style="display:none" class="container">

<h2>Painel Admin</h2>

<div class="card">
<input id="name" class="input" placeholder="Nome">
<input id="price" class="input" placeholder="Preço">
<input id="whatsapp" class="input" placeholder="WhatsApp">
<textarea id="desc" class="input" placeholder="Descrição"></textarea>

<input type="file" id="files" multiple class="input">

<button class="btn btn-main" onclick="save()">Salvar</button>
</div>

<h3>Produtos</h3>
<div id="list"></div>

<script>
const supabase = window.supabase.createClient(
"https://yaoyuizofpiqvqbberww.supabase.co",
"sb_publishable_9QJ7Tejco_rVo3PlWj9aSw_frNrAhZc",
{ auth:{ persistSession:true } }
)

// 🔎 DEBUG AUTH
supabase.auth.onAuthStateChange((event, session)=>{
console.log("AUTH EVENT:", event)
console.log("SESSION:", session)
})

// 🔒 VERIFICA LOGIN
;(async ()=>{
const { data } = await supabase.auth.getSession()

if(!data.session){
alert("Faça login primeiro")
window.location.href = "login.html"
return
}

console.log("LOGADO:", data.session.user.email)
document.body.style.display="block"
})()

// 📤 UPLOAD
async function upload(files){
let urls=[]
for(let f of files){
const name=Date.now()+"_"+f.name

const { error } = await supabase.storage
.from("products")
.upload(name,f)

if(error){
alert("Erro upload")
return
}

const { data } = supabase.storage
.from("products")
.getPublicUrl(name)

urls.push(data.publicUrl)
}
return urls
}

// 💾 SALVAR
async function save(){

const files=document.getElementById("files").files

if(files.length===0){
alert("Selecione imagem")
return
}

const imgs=await upload(files)

const { error } = await supabase.from("products").insert([{
name:document.getElementById("name").value,
price:parseFloat(document.getElementById("price").value),
description:document.getElementById("desc").value,
whatsapp:document.getElementById("whatsapp").value,
images:imgs
}])

if(error){
alert("Erro salvar")
return
}

alert("Salvo")
load()
}

// 📦 LISTAR
async function load(){
const { data } = await supabase.from("products").select("*")
const div=document.getElementById("list")
div.innerHTML=""

data.forEach(p=>{
div.innerHTML+=`
<div class="card">
<strong>${p.name}</strong><br>
R$ ${p.price}<br>
<button class="btn btn-danger" onclick="del(${p.id})">Excluir</button>
</div>`
})
}

// 🗑️ DELETE
async function del(id){
await supabase.from("products").delete().eq("id",id)
load()
}

load()
</script>

</body>
</html>
