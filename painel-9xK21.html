<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="style.css">
</head>

<body class="container">

<!-- LOGIN -->
<div id="login" class="card">
<h2>Painel Admin</h2>

<input id="pass" class="input" placeholder="Senha">

<button id="btn" class="btn btn-main">Entrar</button>

</div>

<!-- PAINEL -->
<div id="panel" style="display:none">

<h2>Painel</h2>

<div class="card">
<input id="name" class="input" placeholder="Nome">
<input id="price" class="input" placeholder="Preço">
<textarea id="desc" class="input" placeholder="Descrição"></textarea>

<button class="btn btn-main" onclick="openPanel()">Abrir Painel</button>
</div>

</div>

<script>
const PASSWORD = "admin123"

console.log("JS carregou")

// botão 100% garantido
document.getElementById("btn").addEventListener("click", function(){

console.log("clicou")

const value = document.getElementById("pass").value

if(value === PASSWORD){

localStorage.setItem("adm","ok")

document.getElementById("login").style.display="none"
document.getElementById("panel").style.display="block"

}else{
alert("Senha errada")
}

})

// auto login
if(localStorage.getItem("adm") === "ok"){
document.getElementById("login").style.display="none"
document.getElementById("panel").style.display="block"
}

function openPanel(){
alert("Painel funcionando")
}
</script>

</body>
</html>
