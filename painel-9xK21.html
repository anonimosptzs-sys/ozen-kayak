<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="style.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
<h2>Ozen Panel</h2>

<div class="menu">
<button onclick="show('dash')">📊 Dashboard</button>
<button onclick="show('prod')">📦 Produtos</button>
</div>
</div>

<!-- MAIN -->
<div class="main">

<!-- DASH -->
<div id="dash">
<h2>Dashboard</h2>
<div class="card">
<p>Total produtos: <span id="total"></span></p>
</div>
</div>

<!-- PRODUTOS -->
<div id="prod" style="display:none">

<h2>Produtos</h2>

<div class="card">

<input id="name" class="input" placeholder="Nome">
<input id="price" class="input" placeholder="Preço">
<textarea id="desc" class="input" placeholder="Descrição"></textarea>

<div id="drop" class="drop">Arraste imagens aqui</div>
<input type="file" id="files" multiple class="input" style="display:none">

<div id="preview" class="preview"></div>

<button class="btn btn-main" onclick="save()">Salvar</button>

</div>

<div id="list" class="products"></div>

</div>

</div>

<script>
const supabase = window.supabase.createClient(
"https://yaoyuizofpiqvqbberww.supabase.co",
"sb_publishable_9QJ7Tejco_rVo3PlWj9aSw_frNrAhZc"
)

// NAV
function show(page){
dash.style.display="none"
prod.style.display="none"

document.getElementById(page).style.display="block"
}

// DRAG & DROP
const drop = document.getElementById("drop")

drop.addEventListener("click",()=>files.click())

drop.addEventListener("dragover",(e)=>{
e.preventDefault()
drop.style.background="#333"
})

drop.addEventListener("drop",(e)=>{
e.preventDefault()
files.files = e.dataTransfer.files
preview({target:files})
})

// PREVIEW
function preview(e){
const div = document.getElementById("preview")
div.innerHTML=""

for(let f of e.target.files){
const url = URL.createObjectURL(f)
div.innerHTML+=`<img src="${url}">`
}
}

// UPLOAD
async function upload(files){
let urls=[]

for(let f of files){
const name = Date.now()+"_"+f.name

await supabase.storage.from("products").upload(name,f)

const { data } = supabase.storage.from("products").getPublicUrl(name)
urls.push(data.publicUrl)
}

return urls
}

// SAVE
async function save(){

const imgs = await upload(files.files)

await supabase.from("products").insert([{
name:name.value,
price:parseFloat(price.value),
description:desc.value,
images:imgs
}])

load()
}

// LOAD
async function load(){
const { data } = await supabase.from("products").select("*")

list.innerHTML=""
total.innerText = data.length

data.forEach(p=>{
list.innerHTML+=`
<div class="card" onclick="edit(${p.id})">
<strong>${p.name}</strong><br>
R$ ${p.price}
</div>`
})
}

// EDITAR PRODUTO
async function edit(id){
const { data } = await supabase
.from("products")
.select("*")
.eq("id",id)
.single()

name.value = data.name
price.value = data.price
desc.value = data.description

show("prod")
}

// INIT
load()
</script>

</body>
</html>
