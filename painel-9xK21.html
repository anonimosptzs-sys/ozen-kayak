<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="style.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body class="container">

<!-- 🔐 LOGIN -->
<div id="loginBox" class="card">
<h2>Login Admin</h2>

<input id="email" class="input" placeholder="Email">
<input id="password" type="password" class="input" placeholder="Senha">

<button class="btn btn-main" onclick="login()">Entrar</button>
</div>

<!-- 🧑‍💻 PAINEL -->
<div id="adminPanel" style="display:none">

<h2>Painel Admin</h2>

<div class="card">
<input id="name" class="input" placeholder="Nome">
<input id="price" class="input" placeholder="Preço">
<input id="whatsapp" class="input" placeholder="WhatsApp">
<textarea id="desc" class="input" placeholder="Descrição"></textarea>

<input type="file" id="files" multiple class="input">

<button class="btn btn-main" onclick="save()">Salvar</button>
<button class="btn btn-danger" onclick="logout()">Sair</button>
</div>

<h3>Produtos</h3>
<div id="list"></div>

</div>

<script>
const supabase = window.supabase.createClient(
"https://yaoyuizofpiqvqbberww.supabase.co",
"sb_publishable_9QJ7Tejco_rVo3PlWj9aSw_frNrAhZc",
{ auth:{ persistSession:true } }
)

// 🔎 DEBUG
supabase.auth.onAuthStateChange((event, session)=>{
console.log("AUTH:", event, session)
})

// 🔐 LOGIN
async function login(){
const email = document.getElementById("email").value.trim()
const password = document.getElementById("password").value.trim()

const { error } = await supabase.auth.signInWithPassword({email,password})

if(error){
alert(error.message)
return
}

check()
}

// 🔓 LOGOUT
async function logout(){
await supabase.auth.signOut()
location.reload()
}

// 🔁 VERIFICA SESSÃO
async function check(){
const { data } = await supabase.auth.getSession()

if(data.session){
document.getElementById("loginBox").style.display="none"
document.getElementById("adminPanel").style.display="block"
load()
}else{
document.getElementById("loginBox").style.display="block"
document.getElementById("adminPanel").style.display="none"
}
}

// 📤 UPLOAD
async function upload(files){
let urls=[]
for(let f of files){
const name=Date.now()+"_"+f.name

await supabase.storage.from("products").upload(name,f)

const { data } = supabase.storage.from("products").getPublicUrl(name)
urls.push(data.publicUrl)
}
return urls
}

// 💾 SALVAR
async function save(){

const files=document.getElementById("files").files

if(files.length===0){
alert("Selecione imagem")
return
}

const imgs=await upload(files)

await supabase.from("products").insert([{
name:name.value,
price:parseFloat(price.value),
description:desc.value,
whatsapp:whatsapp.value,
images:imgs
}])

alert("Salvo")
load()
}

// 📦 LISTAR
async function load(){
const { data } = await supabase.from("products").select("*")
const div=document.getElementById("list")
div.innerHTML=""

data.forEach(p=>{
div.innerHTML+=`
<div class="card">
<strong>${p.name}</strong><br>
R$ ${p.price}<br>
<button class="btn btn-danger" onclick="del(${p.id})">Excluir</button>
</div>`
})
}

// 🗑️ DELETE
async function del(id){
await supabase.from("products").delete().eq("id",id)
load()
}

// iniciar
check()
</script>

</body>
</html>
