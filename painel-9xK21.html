<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="style.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body>

<div class="container">

<!-- FORM -->
<div class="card">

<h2>Painel Produtos</h2>

<input id="name" class="input" placeholder="Nome">
<input id="price" class="input" placeholder="Preço">
<textarea id="desc" class="input" placeholder="Descrição"></textarea>

<input type="file" id="files" multiple class="input">

<button id="btnSave" class="btn btn-main" onclick="save()">Salvar Produto</button>

</div>

<!-- LISTA -->
<h3>Produtos</h3>
<div id="list" class="products"></div>

</div>

<script>
const supabase = window.supabase.createClient(
"https://yaoyuizofpiqvqbberww.supabase.co",
"sb_publishable_9QJ7Tejco_rVo3PlWj9aSw_frNrAhZc"
)

let editingId = null

// 📤 UPLOAD
async function upload(files){
let urls = []

for(let f of files){
const name = Date.now()+"_"+f.name

await supabase.storage.from("products").upload(name,f)

const { data } = supabase.storage.from("products").getPublicUrl(name)
urls.push(data.publicUrl)
}

return urls
}

// 💾 SALVAR OU EDITAR
async function save(){

const files = document.getElementById("files").files
let imgs = []

if(files.length > 0){
imgs = await upload(files)
}

const product = {
name: name.value,
price: parseFloat(price.value),
description: desc.value,
images: imgs
}

// ✏️ UPDATE
if(editingId){

await supabase
.from("products")
.update(product)
.eq("id", editingId)

editingId = null
document.getElementById("btnSave").innerText = "Salvar Produto"

alert("Produto atualizado")
load()
return
}

// ➕ CREATE
await supabase.from("products").insert([product])

alert("Produto criado")
load()
}

// 📦 LISTAR
async function load(){

const { data } = await supabase.from("products").select("*")

list.innerHTML = ""

data.forEach(p=>{
list.innerHTML += `
<div class="card" onclick="edit(${p.id})">
<strong>${p.name}</strong><br>
R$ ${p.price}<br>
<button class="btn btn-danger" onclick="del(${p.id});event.stopPropagation()">Excluir</button>
</div>
`
})
}

// ✏️ EDITAR
async function edit(id){

const { data } = await supabase
.from("products")
.select("*")
.eq("id", id)
.single()

editingId = id

name.value = data.name
price.value = data.price
desc.value = data.description

document.getElementById("btnSave").innerText = "Atualizar Produto"

window.scrollTo({top:0,behavior:"smooth"})
}

// 🗑️ DELETE
async function del(id){
await supabase.from("products").delete().eq("id",id)
load()
}

// INIT
load()
</script>

</body>
</html>
