<!DOCTYPE html>
<html>

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Shop Admin</title>

<link rel="stylesheet" href="style.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{background:#0b1220;color:#fff;font-family:Arial}
img{width:70px;height:70px;object-fit:cover;border-radius:8px;margin:3px}
.card{background:#111;padding:15px;border-radius:10px;margin:10px}
</style>

</head>

<body>

<div id="panel">

<h2>Painel ADM</h2>

<input id="name" placeholder="Nome">
<input id="price" placeholder="Preço">
<input id="whatsapp" placeholder="WhatsApp">
<textarea id="desc" placeholder="Descrição"></textarea>

<input type="file" id="files" multiple>

<div id="preview"></div>

<button id="save">Salvar</button>
<button id="logout">Sair</button>

<h3>Produtos</h3>
<div id="list"></div>

</div>

<script>

const supabase = window.supabase.createClient(
"https://hjjonggbcrtajvtkrqms.supabase.co",
"sb_publishable_u7Z5lgt3hjIWOJxsihqh0Q_2A8MaTjE"
)

let editingId = null

function el(id){
return document.getElementById(id)
}

// 🔐 AUTH
async function init(){

const { data } = await supabase.auth.getSession()

if(!data?.session){
location.href="login.html"
return
}

load()

}

// 🖼 PREVIEW
function preview(){

el("preview").innerHTML=""

Array.from(el("files").files).forEach(f=>{

const r = new FileReader()

r.onload=e=>{
el("preview").innerHTML+=`<img src="${e.target.result}">`
}

r.readAsDataURL(f)

})

}

// 📤 UPLOAD
async function upload(files){

let urls=[]

for(let f of files){

const name = Date.now()+"_"+Math.random().toString(36).slice(2)

await supabase.storage
.from("products")
.upload(name,f)

const { data } = supabase.storage
.from("products")
.getPublicUrl(name)

urls.push(data.publicUrl)

}

return urls

}

// 💾 SAVE
async function save(){

const files = el("files").files

let newImgs = []

if(files.length){
newImgs = await upload(files)
}

let finalImgs = newImgs

if(editingId){

const { data } = await supabase
.from("products")
.select("images")
.eq("id",editingId)
.single()

finalImgs = [...(data?.images || []), ...newImgs]

}

await supabase.from("products").upsert([{
id: editingId,
name: el("name").value,
price: Number(el("price").value || 0),
whatsapp: el("whatsapp").value,
description: el("desc").value,
images: finalImgs
}])

clear()
load()

}

// 📦 LOAD
async function load(){

const { data } = await supabase
.from("products")
.select("*")
.order("id",{ascending:false})

el("list").innerHTML=""

;(data||[]).forEach(p=>{

el("list").innerHTML+=`
<div class="card">

<div style="display:flex">
${(p.images||[]).slice(0,3).map(i=>`<img src="${i}">`).join("")}
</div>

<h3>${p.name}</h3>
<strong>R$ ${p.price}</strong>

<button onclick="edit(${p.id})">Editar</button>
<button onclick="del(${p.id})">Excluir</button>

</div>
`

})

}

// ✏️ EDIT
async function edit(id){

const { data } = await supabase
.from("products")
.select("*")
.eq("id",id)
.single()

editingId=id

el("name").value=data.name
el("price").value=data.price
el("whatsapp").value=data.whatsapp
el("desc").value=data.description

el("preview").innerHTML=""

;(data.images||[]).forEach(i=>{
el("preview").innerHTML+=`<img src="${i}">`
})

}

// 🗑 DELETE
async function del(id){

await supabase
.from("products")
.delete()
.eq("id",id)

load()

}

// 🧹 CLEAR
function clear(){

editingId=null

el("name").value=""
el("price").value=""
el("whatsapp").value=""
el("desc").value=""
el("files").value=""
el("preview").innerHTML=""

}

el("files").onchange=preview
el("save").onclick=save
el("logout").onclick=async()=>{
await supabase.auth.signOut()
location.href="login.html"
}

init()

</script>

</body>

</html>
