<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="style.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body class="container">

<!-- 🔐 LOGIN -->
<div id="loginBox" class="card">
<h2>Senha do Painel</h2>
<input id="senha" class="input" placeholder="Digite a senha">
<button class="btn btn-main" onclick="checkAccess()">Entrar</button>
</div>

<!-- 🧑‍💻 PAINEL -->
<div id="app" style="display:none">

<h2>Painel Admin</h2>

<div class="card">
<input id="name" class="input" placeholder="Nome">
<input id="price" class="input" placeholder="Preço">
<input id="whatsapp" class="input" placeholder="WhatsApp">
<textarea id="desc" class="input" placeholder="Descrição"></textarea>

<input type="file" id="files" multiple class="input">

<button class="btn btn-main" onclick="save()">Salvar</button>
</div>

<h3>Produtos</h3>
<div id="list"></div>

</div>

<script>
const PASSWORD = "admin123";

const supabase = window.supabase.createClient(
"https://yaoyuizofpiqvqbberww.supabase.co",
"sb_publishable_9QJ7Tejco_rVo3PlWj9aSw_frNrAhZc"
)

// 🔐 LOGIN VISUAL
function checkAccess(){
const input = document.getElementById("senha").value

if(input === PASSWORD){
localStorage.setItem("adm", PASSWORD)
start()
}else{
alert("Senha incorreta")
}
}

// 🚀 INICIAR PAINEL
function start(){
document.getElementById("loginBox").style.display="none"
document.getElementById("app").style.display="block"
load()
}

// 🔁 AUTO LOGIN
if(localStorage.getItem("adm") === PASSWORD){
start()
}

// 📤 UPLOAD
async function upload(files){
let urls=[]
for(let f of files){
const name=Date.now()+"_"+f.name
await supabase.storage.from("products").upload(name,f)
const { data } = supabase.storage.from("products").getPublicUrl(name)
urls.push(data.publicUrl)
}
return urls
}

// 💾 SALVAR
async function save(){
const files=document.getElementById("files").files

if(files.length===0){
alert("Selecione imagem")
return
}

const imgs=await upload(files)

await supabase.from("products").insert([{
name:name.value,
price:parseFloat(price.value),
description:desc.value,
whatsapp:whatsapp.value,
images:imgs
}])

alert("Salvo")
load()
}

// 📦 LISTAR
async function load(){
const { data } = await supabase.from("products").select("*")
const div=document.getElementById("list")
div.innerHTML=""

data.forEach(p=>{
div.innerHTML+=`
<div class="card">
<strong>${p.name}</strong><br>
R$ ${p.price}<br>
<button class="btn btn-danger" onclick="del(${p.id})">Excluir</button>
</div>`
})
}

// 🗑️ DELETE
async function del(id){
await supabase.from("products").delete().eq("id",id)
load()
}
</script>

</body>
</html>
