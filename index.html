<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="style.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<title>OZKEN KAYAK</title>
</head>

<body>

<div class="container">

<h1>OZKEN KAYAK</h1>

<div id="products" class="products"></div>

</div>

<script>
function esc(str) {
  return String(str)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#39;');
}

const supabase = window.supabase.createClient(
  "https://hjjonggbcrtajvtkrqms.supabase.co",
  "sb_publishable_u7Z5lgt3hjIWOJxsihqh0Q_2A8MaTjE"
)

async function load() {
  const { data, error } = await supabase
    .from("products")
    .select("*")
    .order("id", { ascending: false })

  if (error) {
    console.log(error)
    return
  }

  const div = document.getElementById("products")
  let html = ""

  data.forEach(p => {
    const img = Array.isArray(p.images) && p.images[0] ? esc(p.images[0]) : ''
    html += `
      <div class="card">
        ${img ? `<img src="${img}" class="product-img">` : ''}
        <h3>${esc(p.name)}</h3>
        <strong>R$ ${esc(p.price)}</strong>
        <a href="product.html?id=${esc(p.id)}">
          <button class="btn btn-main">Saiba mais</button>
        </a>
      </div>
    `
  })

  div.innerHTML = html
}

load()
</script>

</body>
</html>
