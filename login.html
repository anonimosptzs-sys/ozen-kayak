<!DOCTYPE html>
<html>
<head>
<link rel="stylesheet" href="style.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="container">

<h2>Login</h2>

<input id="email" class="input" placeholder="Email">
<input id="password" type="password" class="input" placeholder="Senha">

<button class="btn btn-main" onclick="login()">Entrar</button>

<script>
const supabase = window.supabase.createClient(
"https://yaoyuizofpiqvqbberww.supabase.co",
"sb_publishable_9QJ7Tejco_rVo3PlWj9aSw_frNrAhZc"
)

async function login(){
const email = document.getElementById("email").value
const password = document.getElementById("password").value

try{
const { data, error } = await supabase.auth.signInWithPassword({
  email,
  password
})

if(error){
  alert("Erro: " + error.message)
  return
}

alert("Login feito")
window.location.href = "painel-9xK21.html"

}catch(e){
alert("Erro inesperado")
console.error(e)
}
}
</script>

</body>
</html>
