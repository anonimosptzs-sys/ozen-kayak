<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Login</title>
<link rel="stylesheet" href="style.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body class="container">

<h2>Login Admin</h2>

<input id="email" class="input" placeholder="Email">
<input id="password" type="password" class="input" placeholder="Senha">

<button id="btnLogin" class="btn btn-main">Entrar</button>

<script>
const supabase = window.supabase.createClient(
"https://yaoyuizofpiqvqbberww.supabase.co",
"sb_publishable_9QJ7Tejco_rVo3PlWj9aSw_frNrAhZc"
)

// garante que o JS rodou
console.log("JS carregado")

document.getElementById("btnLogin").addEventListener("click", async () => {

console.log("Botão clicado")

const email = document.getElementById("email").value.trim()
const password = document.getElementById("password").value.trim()

console.log("Dados:", email, password)

const { data, error } = await supabase.auth.signInWithPassword({
  email,
  password
})

if(error){
  console.error("Erro login:", error)
  alert("Erro: " + error.message)
  return
}

console.log("Login OK")
alert("Entrou")
window.location.href = "painel-9xK21.html"

})
</script>

</body>
</html>
