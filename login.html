<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Login</title>
<link rel="stylesheet" href="style.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body class="container">

<h2>Login Admin</h2>

<input id="email" class="input" placeholder="Email">
<input id="password" type="password" class="input" placeholder="Senha">

<button class="btn btn-main" onclick="login(event)">Entrar</button>

<script>
const supabase = window.supabase.createClient(
"https://yaoyuizofpiqvqbberww.supabase.co",
"sb_publishable_9QJ7Tejco_rVo3PlWj9aSw_frNrAhZc"
)

async function login(e){
e.preventDefault()

const email = document.getElementById("email").value.trim()
const password = document.getElementById("password").value.trim()

console.log("Tentando login:", email)

try{
const { data, error } = await supabase.auth.signInWithPassword({
  email,
  password
})

if(error){
  console.error("Erro login:", error)
  alert("Erro: " + error.message)
  return
}

console.log("Login OK:", data)

alert("Login realizado com sucesso")
window.location.href = "painel-9xK21.html"

}catch(err){
console.error("Erro inesperado:", err)
alert("Erro inesperado, veja o console")
}
}
</script>

</body>
</html>
